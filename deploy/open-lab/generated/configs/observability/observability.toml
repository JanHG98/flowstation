[server]
bind = "0.0.0.0:8210"
history_limit = 5000
max_body_bytes = 4194304

[storage]
state_path = "/var/lib/netcore-observability/state.json"
backup_path = "/var/lib/netcore-observability/state.json.bak"
diagnostic_dir = "/var/lib/netcore-observability/diagnostics"

[security]
mode = "open_lab"
token_auth = false
tls = false
allow_remote_management = true
warning_banner = "OPEN LAB: no login, no tokens and no TLS. Isolated management network only."

[collection]
scrape_interval_secs = 15
request_timeout_ms = 2000
max_response_bytes = 2097152
scrape_on_start = true
ingest_logs = true
ingest_traces = true

[retention]
metric_retention_secs = 86400
log_retention_secs = 604800
trace_retention_secs = 86400
audit_retention_secs = 2592000
max_series = 10000
max_samples_per_series = 5760
max_logs = 100000
max_spans = 50000
max_alerts = 10000
max_audit_records = 50000

[stack]
prometheus_url = "http://127.0.0.1:9090"
grafana_url = "http://127.0.0.1:3000"
loki_url = "http://127.0.0.1:3100"
alertmanager_url = "http://127.0.0.1:9093"
prometheus_ready_path = "/-/ready"
grafana_ready_path = "/api/health"
loki_ready_path = "/ready"
alertmanager_ready_path = "/-/ready"

# In a distributed LXC setup, replace 127.0.0.1 with the management IP or DNS
# name of each service container. All endpoints are deliberately HTTP-only in
# this open-lab package.

[[targets]]
target_id = "node-gateway"
display_name = "Node Gateway"
service = "node-gateway"
base_url = "http://10.0.20.10:8080"
metrics_path = "/metrics"
live_path = "/health/live"
ready_path = "/health/ready"
enabled = true
labels = { environment = "open-lab", component = "node-gateway" }

