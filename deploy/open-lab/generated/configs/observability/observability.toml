[[alert_rules]]
rule_id = "target-down"
name = "Target down"
description = "A monitored target does not answer its liveness endpoint"
metric = "netcore_observability_target_up"
comparator = "<"
threshold = 1.0
for_secs = 30
severity = "critical"
enabled = true
labels = { source = "netcore-observability" }
annotations = { runbook = "Check service process, network path and /health/live" }

[[alert_rules]]
rule_id = "target-not-ready"
name = "Target not ready"
description = "A service is alive but reports not ready"
metric = "netcore_observability_target_ready"
comparator = "<"
threshold = 1.0
for_secs = 60
severity = "warning"
enabled = true
labels = { source = "netcore-observability" }
annotations = { runbook = "Check dependencies and /health/ready" }

[[alert_rules]]
rule_id = "repeated-scrape-errors"
name = "Repeated scrape errors"
description = "The NMS cannot collect metrics from a target repeatedly"
metric = "netcore_observability_target_consecutive_failures"
comparator = ">="
threshold = 3.0
for_secs = 0
severity = "warning"
enabled = true
labels = { source = "netcore-observability" }
annotations = { runbook = "Check the target /metrics endpoint and NMS routing" }
