# NetCore-Tetra Application Gateway – Open Lab

[server]
bind = "0.0.0.0:8220"
public_base_url = "http://10.0.20.23:8220"
max_body_bytes = 4194304
history_limit = 5000

[storage]
state_path = "/var/lib/netcore-application-gateway/state.json"
state_backup_path = "/var/lib/netcore-application-gateway/state.json.bak"
secrets_path = "/var/lib/netcore-application-gateway/secrets.json"
spool_dir = "/var/lib/netcore-application-gateway/spool"
backup_dir = "/var/lib/netcore-application-gateway/backups"

[security]
mode = "open_lab"
management_token_auth = false
management_tls = false
allow_remote_management = true
connector_secrets_allowed = true
warning_banner = "OPEN LAB: no login, no management tokens and no TLS. Isolated management network only."

[runtime]
# shadow calculates and records routes without calling external systems.
# Change to authoritative only after connector endpoints were verified.
operating_mode = "shadow"
worker_interval_ms = 1000
probe_interval_secs = 30
default_ttl_secs = 300
max_attempts = 6
base_backoff_secs = 2
max_backoff_secs = 120
dedupe_window_secs = 600
max_response_bytes = 65536
max_artifact_bytes = 33554432
max_events = 20000
max_deliveries = 50000
max_tts_jobs = 5000
max_audit_records = 50000
event_retention_secs = 604800
delivery_retention_secs = 1209600
audit_retention_secs = 2592000

[[connectors]]
connector_id = "sds-router"
display_name = "SDS Router"
kind = "sds_router"
direction = "outbound"
endpoint = "http://10.0.20.17:8150/api/v1/messages"
health_endpoint = "http://10.0.20.17:8150/health/ready"
enabled = true
timeout_ms = 5000
rate_limit_per_minute = 600
circuit_failure_threshold = 5
circuit_open_secs = 60
required_secrets = []
settings = { source_issi = "9999", sds_type = "4", protocol_id = "0", priority = "3" }

[[connectors]]
connector_id = "piper-tts"
display_name = "Piper TTS"
kind = "piper_tts"
direction = "outbound"
endpoint = "http://127.0.0.1:5005/synthesize"
health_endpoint = "http://127.0.0.1:5005/voices"
enabled = true
timeout_ms = 30000
rate_limit_per_minute = 30
circuit_failure_threshold = 3
circuit_open_secs = 60
required_secrets = []
settings = {}

[[connectors]]
connector_id = "media-library"
display_name = "Media Library"
kind = "media_library"
direction = "outbound"
endpoint = "http://10.0.20.24:8230/api/v1/assets/import-url"
health_endpoint = "http://10.0.20.24:8230/health/ready"
enabled = true
timeout_ms = 10000
rate_limit_per_minute = 120
circuit_failure_threshold = 5
circuit_open_secs = 60
required_secrets = []
settings = { method = "POST" }

[[connectors]]
connector_id = "telegram"
display_name = "Telegram Bot"
kind = "telegram_bot"
direction = "bidirectional"
endpoint = "https://api.telegram.org/bot{bot_token}/sendMessage"
enabled = false
timeout_ms = 10000
rate_limit_per_minute = 30
circuit_failure_threshold = 5
circuit_open_secs = 120
required_secrets = ["bot_token"]
settings = { chat_id = "", parse_mode = "" }

