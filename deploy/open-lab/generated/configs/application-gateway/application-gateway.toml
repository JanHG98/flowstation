kind = "directory_http"
direction = "bidirectional"
endpoint = "http://127.0.0.1:8060/api/v1/events"
enabled = false
timeout_ms = 5000
rate_limit_per_minute = 120
circuit_failure_threshold = 5
circuit_open_secs = 60
required_secrets = []
