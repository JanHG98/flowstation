[[rules]]
rule_id = "manual-to-sds"
name = "Manual messages to SDS Router"
enabled = true
priority = 100
source_connector = "manual"
event_type = "sds.message"
target_connector = "sds-router"
template_id = "sds-standard"
stop_processing = false

[[rules]]
rule_id = "manual-webhook"
name = "Manual webhook dispatch"
enabled = false
priority = 50
source_connector = "manual"
event_type = "webhook.message"
target_connector = "generic-webhook"
template_id = "generic-event-json"
stop_processing = false

[[templates]]
template_id = "sds-standard"
name = "SDS Standard"
kind = "text"
body = "{{text}}"
content_type = "text/plain; charset=utf-8"
enabled = true
target_connector = "sds-router"
description = "Plain SDS text with destination supplied by the event"

[[templates]]
template_id = "generic-event-json"
name = "Generic event JSON"
kind = "json"
body = '''{"source":"{{source}}","event_type":"{{event_type}}","destination":"{{destination}}","text":"{{text}}"}'''
content_type = "application/json"
enabled = true
target_connector = "generic-webhook"
description = "Small interoperable webhook envelope"

[[templates]]
template_id = "tts-announcement"
name = "TTS Announcement"
kind = "tts"
body = "Achtung. {{text}}"
content_type = "text/plain; charset=utf-8"
enabled = true
target_connector = "piper-tts"
description = "Reusable TTS announcement prefix"
