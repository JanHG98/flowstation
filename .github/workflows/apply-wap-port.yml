name: Apply and verify WAP port

on:
  push:
    branches:
      - feature/wap-sndcp
  pull_request:
    branches:
      - main
    paths:
      - '.github/wap-port-payload/**'
      - '.github/workflows/apply-wap-port.yml'

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: wap-port-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  apply-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/wap-sndcp
          fetch-depth: 0

      - name: Detect staged payload
        id: payload
        shell: bash
        run: |
          if compgen -G '.github/wap-port-payload/part-*' > /dev/null; then
            echo 'present=true' >> "$GITHUB_OUTPUT"
          else
            echo 'present=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Reconstruct and verify patch
        if: steps.payload.outputs.present == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cat .github/wap-port-payload/part-* > /tmp/wap-port.patch.gz.b64
          echo '4d009326fa12702828325d590387d0978ae11ef68e75ab4d92ca28b10423fac9  /tmp/wap-port.patch.gz.b64' | sha256sum -c -
          base64 --decode /tmp/wap-port.patch.gz.b64 > /tmp/wap-port.patch.gz
          echo 'c33cdfa4efadfbbe83b4b2fe1e8a274ca18fd1ba62b2df594837cabcfdff085e  /tmp/wap-port.patch.gz' | sha256sum -c -
          gzip --decompress --stdout /tmp/wap-port.patch.gz > /tmp/wap-port.patch
          echo 'e298d91e7bac44013aae87aff72b9338c19f7c568a2a11c2c8319fdd971e1d75  /tmp/wap-port.patch' | sha256sum -c -
          git apply --check /tmp/wap-port.patch
          git apply --index /tmp/wap-port.patch

      - name: Adapt to NetCore LLC surface
        if: steps.payload.outputs.present == 'true'
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('crates/tetra-entities/src/umac/umac_bs.rs')
          source = path.read_text()
          source = source.replace(
              'use tetra_pdus::llc::pdus::{al_data::AlData, bl_adata::BlAdata, bl_data::BlData, bl_udata::BlUdata};',
              'use tetra_pdus::llc::pdus::{bl_adata::BlAdata, bl_data::BlData, bl_udata::BlUdata};',
          )
          source = source.replace(
              '            Some(LlcPduType::AlDataAlFinal) => AlData::from_bitbuf(&mut wrapped).is_ok(),\n',
              '',
          )
          path.write_text(source)
          PY

      - name: Install native build dependencies
        if: steps.payload.outputs.present == 'true'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --yes pkg-config libsoapysdr-dev libgsm1-dev

      - name: Provide codec linker stub for protocol-only tests
        if: steps.payload.outputs.present == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/wap-native
          cat > /tmp/wap-native/tetra-codec-stub.c <<'C'
          #include <stdint.h>
          #include <stdlib.h>

          void *tetra_encoder_create(void) { return NULL; }
          void *tetra_decoder_create(void) { return NULL; }
          void tetra_codec_destroy(void *state) { (void)state; }
          void tetra_encode(void *state, const int16_t *pcm, uint8_t *coded) {
              (void)state; (void)pcm; (void)coded;
          }
          void tetra_decode(void *state, const uint8_t *coded, int16_t *pcm, int32_t bfi) {
              (void)state; (void)coded; (void)pcm; (void)bfi;
          }
          C
          cc -c /tmp/wap-native/tetra-codec-stub.c -o /tmp/wap-native/tetra-codec-stub.o
          ar rcs /tmp/wap-native/libtetra-codec.a /tmp/wap-native/tetra-codec-stub.o
          echo 'RUSTFLAGS=-L native=/tmp/wap-native' >> "$GITHUB_ENV"

      - name: Ensure Rust toolchain
        if: steps.payload.outputs.present == 'true'
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt
          rustup default stable

      - name: Format changed Rust files
        if: steps.payload.outputs.present == 'true'
        shell: bash
        run: |
          rustfmt --edition 2024 \
            crates/tetra-config/src/bluestation/config.rs \
            crates/tetra-config/src/bluestation/sec_cell.rs \
            crates/tetra-entities/src/sndcp/ip.rs \
            crates/tetra-entities/src/sndcp/mod.rs \
            crates/tetra-entities/src/sndcp/sndcp_bs.rs \
            crates/tetra-entities/src/sndcp/wap.rs \
            crates/tetra-entities/src/umac/subcomp/bs_sched.rs \
            crates/tetra-entities/src/umac/umac_bs.rs \
            crates/tetra-entities/tests/common/default_stack.rs

      - name: Check configuration crate
        if: steps.payload.outputs.present == 'true'
        shell: bash
        run: |
          set -o pipefail
          cargo check --locked -p tetra-config 2>&1 | tee /tmp/wap-ci.log

      - name: Check runtime entities
        if: steps.payload.outputs.present == 'true'
        shell: bash
        run: |
          set -o pipefail
          cargo check --locked -p tetra-entities 2>&1 | tee -a /tmp/wap-ci.log

      - name: Run SNDCP and WAP tests
        if: steps.payload.outputs.present == 'true'
        shell: bash
        run: |
          set -o pipefail
          cargo test --locked -p tetra-entities --lib sndcp 2>&1 | tee -a /tmp/wap-ci.log

      - name: Run assigned-PDCH test
        if: steps.payload.outputs.present == 'true'
        shell: bash
        run: |
          set -o pipefail
          cargo test --locked -p tetra-entities --lib packet_data_assignment_owns_ts2_until_quit_and_go 2>&1 | tee -a /tmp/wap-ci.log

      - name: Upload WAP CI log
        if: always() && steps.payload.outputs.present == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: wap-ci-log
          path: /tmp/wap-ci.log
          if-no-files-found: ignore
          retention-days: 3

      - name: Commit verified implementation
        if: steps.payload.outputs.present == 'true' && success()
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .github/wap-port-payload
          git add --all
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Implement SNDCP WAP/IP service'
          git push origin HEAD:feature/wap-sndcp
