name: SWMI Mobility Call Restore

on:
  push:
    paths:
      - "crates/tetra-saps/src/control/mle_cell_change.rs"
      - "crates/tetra-entities/src/cmce/**"
      - "crates/tetra-entities/src/mle/**"
      - "crates/tetra-entities/tests/test_call_restore_runtime.rs"
      - "crates/tetra-entities/tests/test_two_cell_call_restore.rs"
      - "crates/tetra-entities/tests/test_mle_cell_change_runtime.rs"
      - "crates/tetra-entities/tests/test_two_cell_mobility.rs"
      - "crates/tetra-entities/tests/common/**"
      - "tools/check_mle_cell_change.py"
      - "tools/check_cmce_call_restore.py"
      - ".github/workflows/swmi-mobility-call-restore.yml"
  pull_request:
    paths:
      - "crates/tetra-saps/src/control/mle_cell_change.rs"
      - "crates/tetra-entities/src/cmce/**"
      - "crates/tetra-entities/src/mle/**"
      - "crates/tetra-entities/tests/test_call_restore_runtime.rs"
      - "crates/tetra-entities/tests/test_two_cell_call_restore.rs"
      - "crates/tetra-entities/tests/test_mle_cell_change_runtime.rs"
      - "crates/tetra-entities/tests/test_two_cell_mobility.rs"
      - "crates/tetra-entities/tests/common/**"
      - "tools/check_mle_cell_change.py"
      - "tools/check_cmce_call_restore.py"
      - ".github/workflows/swmi-mobility-call-restore.yml"

jobs:
  mobility-call-restore:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Static architecture checks
        run: |
          python3 tools/check_swmi_foundation_types.py
          python3 tools/check_tlmc_runtime.py
          python3 tools/check_ltpd_runtime.py
          python3 tools/check_foundation_acceptance.py
          python3 tools/check_mle_cell_change.py
          python3 tools/check_cmce_call_restore.py
          python3 tools/protocol_inventory.py --check
      - name: Formatting
        run: cargo fmt --all -- --check
      - name: Call restoration tests
        run: |
          cargo test -p tetra-saps
          cargo test -p tetra-pdus --test test_mle_cell_change_pdus
          cargo test -p tetra-entities --test test_mle_cell_change_runtime
          cargo test -p tetra-entities --test test_call_restore_runtime
          cargo test -p tetra-entities --test test_two_cell_foundation
          cargo test -p tetra-entities --test test_two_cell_mobility
          cargo test -p tetra-entities --test test_two_cell_call_restore
      - name: Clippy
        run: cargo clippy -p tetra-saps -p tetra-pdus -p tetra-entities --all-targets -- -D warnings
