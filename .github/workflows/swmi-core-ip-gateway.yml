name: SWMI Core IP Gateway

on:
  push:
    paths:
      - 'system-backend/ip-gateway/**'
      - 'system-backend/packet-core/src/state.rs'
      - 'tools/check_ip_gateway.py'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/swmi-core-ip-gateway.yml'
  pull_request:
    paths:
      - 'system-backend/ip-gateway/**'
      - 'system-backend/packet-core/src/state.rs'
      - 'tools/check_ip_gateway.py'
      - 'Cargo.toml'
      - 'Cargo.lock'

jobs:
  ip-gateway:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Static IP Gateway checks
        run: python3 tools/check_ip_gateway.py
      - name: Format
        run: cargo fmt --all -- --check
      - name: Tests
        run: cargo test -p netcore-packet-core -p netcore-ip-gateway
      - name: Release build
        run: cargo build --release -p netcore-ip-gateway
      - name: Clippy
        run: cargo clippy -p netcore-ip-gateway --all-targets -- -D warnings
