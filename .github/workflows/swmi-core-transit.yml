name: SWMI Core Transit

on:
  push:
    paths:
      - "system-backend/transit/**"
      - "tools/check_transit.py"
      - "Docs/SWMI_CORE_1_PACKAGE_K_TRANSIT.md"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/swmi-core-transit.yml"
  pull_request:
    paths:
      - "system-backend/transit/**"
      - "tools/check_transit.py"
      - "Docs/SWMI_CORE_1_PACKAGE_K_TRANSIT.md"
      - "Cargo.toml"
      - "Cargo.lock"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Static package check
        run: python3 tools/check_transit.py
      - name: Format
        run: cargo fmt --all -- --check
      - name: Build
        run: cargo build --locked --package netcore-transit
      - name: Test
        run: cargo test --locked --package netcore-transit
      - name: Clippy
        run: cargo clippy --locked --package netcore-transit --all-targets -- -D warnings
