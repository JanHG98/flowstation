name: SWMI Foundation Acceptance

on:
  push:
    paths:
      - "crates/tetra-entities/src/mle/ltpd_runtime.rs"
      - "crates/tetra-entities/src/messagerouter.rs"
      - "crates/tetra-entities/tests/test_ltpd_runtime.rs"
      - "crates/tetra-entities/tests/test_two_cell_foundation.rs"
      - "crates/tetra-entities/tests/common/**"
      - "tools/check_foundation_acceptance.py"
      - ".github/workflows/swmi-foundation-acceptance.yml"
  pull_request:
    paths:
      - "crates/tetra-entities/src/mle/ltpd_runtime.rs"
      - "crates/tetra-entities/src/messagerouter.rs"
      - "crates/tetra-entities/tests/test_ltpd_runtime.rs"
      - "crates/tetra-entities/tests/test_two_cell_foundation.rs"
      - "crates/tetra-entities/tests/common/**"
      - "tools/check_foundation_acceptance.py"
      - ".github/workflows/swmi-foundation-acceptance.yml"

jobs:
  acceptance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Static architecture checks
        run: |
          python3 tools/check_swmi_foundation_types.py
          python3 tools/check_tlmc_runtime.py
          python3 tools/check_ltpd_runtime.py
          python3 tools/check_foundation_acceptance.py
          python3 tools/protocol_inventory.py --check
      - name: Formatting
        run: cargo fmt --all -- --check
      - name: Foundation tests
        run: |
          cargo test -p tetra-saps
          cargo test -p tetra-entities --lib mle::ltpd_runtime::tests
          cargo test -p tetra-entities --test test_tlmc_runtime
          cargo test -p tetra-entities --test test_ltpd_runtime
          cargo test -p tetra-entities --test test_two_cell_foundation
      - name: Clippy
        run: cargo clippy -p tetra-saps -p tetra-entities --all-targets -- -D warnings
