name: KMF

on:
  push:
    paths:
      - "system-backend/kmf/**"
      - "tools/check_kmf.py"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/kmf.yml"
  pull_request:
    paths:
      - "system-backend/kmf/**"
      - "tools/check_kmf.py"
      - "Cargo.toml"
      - "Cargo.lock"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Static package check
        run: python3 tools/check_kmf.py
      - name: Format
        run: cargo fmt --all -- --check
      - name: Build
        run: cargo build --locked --package netcore-kmf
      - name: Test
        run: cargo test --locked --package netcore-kmf
      - name: Clippy
        run: cargo clippy --locked --package netcore-kmf --all-targets -- -D warnings
