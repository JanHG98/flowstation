version = 1

[webui_defaults]
required = true
scheme = "https"
management_port = 8443
api_base = "/api/v1"
health_live = "/health/live"
health_ready = "/health/ready"
metrics = "/metrics"
openapi = "/openapi.json"
independent_from_control_room = true
same_process_or_package = true

[[services]]
name = "node-gateway"
webui = true
scheme = "http"
management_port = 8080
security_mode = "open_lab"
token_auth = false
tls = false
warning = "Isolated test network only; every reachable client has management access"

[[services]]
name = "subscriber-core"
webui = true
scheme = "http"
management_port = 8100
security_mode = "open_lab"
token_auth = false
tls = false
warning = "Isolated test network only; every reachable client may change subscriber admission policy"

[[services]]
name = "group-core"
webui = true
scheme = "http"
management_port = 8110
security_mode = "open_lab"
token_auth = false
tls = false
warning = "Isolated test network only; every reachable client may change group policy and DGNA"

[[services]]
name = "mobility-core"
webui = true
scheme = "http"
management_port = 8090
security_mode = "open_lab"
token_auth = false
tls = false
warning = "Isolated test network only; every reachable client may start context transfers"

[[services]]
name = "call-control"
webui = true
scheme = "http"
management_port = 8120
security_mode = "open_lab"
token_auth = false
tls = false
warning = "OPEN LAB: no authentication, no tokens and no TLS; isolated test network only"

[[services]]
name = "media-switch"
webui = true
scheme = "http"
management_port = 8130
security_mode = "open_lab"
token_auth = false
tls = false
warning = "OPEN LAB: no authentication, no tokens and no TLS; every reachable client may route, mute or inject media"

[[services]]
name = "sds-router"
webui = true
scheme = "http"
management_port = 8150
security_mode = "open_lab"
token_auth = false
tls = false
depends_on = ["node-gateway"]
warning = "OPEN LAB: no authentication, no tokens and no TLS; every reachable client may read payloads, send SDS/status and alter routes"

[[services]]
name = "packet-core"
webui = true
scheme = "http"
management_port = 8160
security_mode = "open_lab"
token_auth = false
tls = false
depends_on = ["node-gateway"]
warning = "OPEN LAB: no authentication, no tokens and no TLS; every reachable client may inspect payloads, alter PDP contexts and page or deactivate subscribers"

[[services]]
name = "ip-gateway"
webui = true

[[services]]
name = "security-core"
webui = true
restricted_management_network = true

[[services]]
name = "kmf"
webui = true
restricted_management_network = true
raw_secret_display = false

[[services]]
name = "transit"
webui = true

[[services]]
name = "control-room"
webui = true

[[services]]
name = "application-gateway"
webui = true

[[services]]
name = "media-library"
webui = true

[[services]]
name = "recorder"
webui = true
scheme = "http"
management_port = 8140
security_mode = "open_lab"
token_auth = false
tls = false
depends_on = ["media-switch"]
warning = "OPEN LAB: no authentication, no tokens and no TLS; every reachable client may export or manage recordings"

[[services]]
name = "observability"
webui = true

[[services]]
name = "shared"
webui = false
reason = "Library directory, not a deployable container"
