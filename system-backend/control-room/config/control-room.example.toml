# NetCore Control Room LXC – Open Lab

[server]
bind = "0.0.0.0:9010"
node_path = "/node"
ui_path = "/ui"
history_limit = 2000

[persistence]
enabled = true
database_path = "/var/lib/netcore-control-room/control-room.sqlite3"
persist_events = true
persist_noisy_events = false
load_recent_limit = 2000

[auth]
# Current laboratory phase: deliberately no login, no node token and no TLS.
enabled = false
allow_health_unauthenticated = true
node_token_env = ""
bootstrap_username_env = ""
bootstrap_password_env = ""
bootstrap_role = "admin"

[federation]
enabled = true
poll_interval_secs = 5
request_timeout_ms = 1200
failure_threshold = 3
fetch_summaries = true

[operations]
state_path = "/var/lib/netcore-control-room/operations.json"
backup_path = "/var/lib/netcore-control-room/operations.json.bak"
auto_service_incidents = true
incident_limit = 5000
shift_log_limit = 10000

# Replace 10.0.20.x with the addresses of the respective LXCs.
[[services]]
name = "node-gateway"
display_name = "Node Gateway"
kind = "edge"
base_url = "http://10.0.20.10:8080"
health_live = "/health/live"
health_ready = "/health/ready"
summary_path = "/api/v1/status"
webui_path = "/"
critical = true
enabled = true

