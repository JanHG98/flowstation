# NetCore Control Room Core configuration for LXC/container deployment.
# CLI flags override values from this file.

[server]
# In the LXC this should usually bind to all interfaces in the trusted VLAN/VPN.
bind = "0.0.0.0:9010"

# Base-station nodes connect here via WebSocket.
node_path = "/node"

# Reserved for native operator clients/live feeds. This is protocol/API, not a browser UI requirement.
ui_path = "/ui"

# In-memory ring buffer for recent events and command audit entries.
history_limit = 1000

[persistence]
# Enables SQLite persistence for audit/history data and user/RBAC registry.
enabled = true

# Recommended path when running as systemd service in the LXC.
database_path = "/var/lib/netcore-control-room/control-room.sqlite3"

# Persist event log rows. High-rate RF/health noise is filtered unless persist_noisy_events=true.
persist_events = true
persist_noisy_events = false

# Number of recent persisted rows loaded back into memory on startup.
load_recent_limit = 1000

[auth]
# Set to true after you configured the node token and bootstrap user/password in
# /etc/netcore-control-room/control-room.env and added the node token to the TBS config.toml.
enabled = false

# Keep /health available without login for systemd/monitoring checks.
allow_health_unauthenticated = true

# TBS machine auth. Prefer environment variable over writing the secret here.
node_token_env = "NETCORE_CONTROL_ROOM_NODE_TOKEN"

# Initial/recovery admin login. Prefer environment variables over writing secrets here.
bootstrap_username_env = "NETCORE_CONTROL_ROOM_BOOTSTRAP_USER"
bootstrap_password_env = "NETCORE_CONTROL_ROOM_BOOTSTRAP_PASSWORD"
bootstrap_role = "admin"

# Development-only alternative. Do not commit real secrets.
# node_token = "change-me-node-token"
# bootstrap_username = "jan"
# bootstrap_password = "change-me-admin-password"


# Zentrales Directory für Operator-UI und API. Keine Secrets hier eintragen.
[directory]
hide_infrastructure = true

[directory.subscribers."2010002"]
name = "Jan HRT"
device_class = "HRT"
status = "Einsatzbereit"
status_group = "crew"
groups = [15201, 15205]

[directory.groups."15201"]
name = "NetCore Crew"
kind = "Sprechgruppe"

[directory.status_groups."crew"]
name = "Crew-Status"

[directory.statuses."1"]
label = "Frei / bereit"
group = "crew"
